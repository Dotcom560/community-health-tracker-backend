services:
  - type: web
    name: community-health-tracker-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/community-health-tracker-backend
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn community_health_tracker.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: community-health-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com,.netlify.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR_NETLIFY_APP.netlify.app
      - key: DEBUG
        value: False
      - key: DJANGO_SETTINGS_MODULE
        value: community_health_tracker.settings_production