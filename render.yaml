services:
  - type: web
    name: community-health-tracker-api
    runtime: python
    repo: https://github.com/Dotcom560/community-health-tracker-backend
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn healthtracker.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: healthtracker.settings
      - key: DATABASE_URL
        fromDatabase:
          name: community-health-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://community-health-tracker-w-g5.netlify.app
      - key: DEBUG
        value: False

  - type: database
    name: community-health-db
    plan: free